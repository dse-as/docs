# Workflow for building and deploying the VitePress documentation site to GitHub Pages
#
name: Documentation deployment

on:
  # Runs on pushes targeting the `main` branch.
  push:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Allows to run this workflow from external triggers
  repository_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Not needed if lastUpdated is not enabled
      # - uses: pnpm/action-setup@v3 # Uncomment this if you're using pnpm
      # - uses: oven-sh/setup-bun@v1 # Uncomment this if you're using Bun
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn # or npm / pnpm
      # Preparatory step: get framework files to provide them directly from the docu context
      - name: Resolve latest Oxygen Framework release
        id: oxygen
        run: |
          meta=$(curl -sL https://api.github.com/repos/dse-as/oxygen-framework/releases/latest)
          echo "tag=$(echo "$meta" | jq -r '.tag_name')" >> "$GITHUB_OUTPUT"
          echo "zipball=$(echo "$meta" | jq -r '.zipball_url')" >> "$GITHUB_OUTPUT"
      # Cache the raw download, keyed on the release tag, so unchanged releases
      # are not re-downloaded on every build. The cache path is separate from the
      # working copy so the later `zip` step does not overwrite the cached file.
      - name: Cache Oxygen Framework download
        id: oxygen-cache
        uses: actions/cache@v4
        with:
          path: .oxygen-cache/dseas.zip
          key: oxygen-framework-${{ steps.oxygen.outputs.tag }}
      - name: Download Oxygen Framework (cache miss)
        if: steps.oxygen-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .oxygen-cache
          wget --quiet "${{ steps.oxygen.outputs.zipball }}" -O .oxygen-cache/dseas.zip
      - name: Prepare Oxygen Framework
        run: |
          cp .oxygen-cache/dseas.zip src/public/dseas.zip
          unzip src/public/dseas.zip -d "src/public/dseas"
          mv src/public/dseas/dse-as-oxygen-framework-*/* src/public/dseas
          cp src/public/dseas/dseas.xml src/public/
          rm -r src/public/dseas/dse-as-oxygen-framework-*
          cd src/public && zip -r - dseas >dseas.zip
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Install dependencies
        run: yarn install # or npm ci / pnpm install / bun install
      - name: Build with VitePress
        env:
          BASE: '/docs/'
        run: yarn run docs:build # or npm docs:build / pnpm docs:build / bun run docs:build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
